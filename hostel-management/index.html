<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="sidebar">

<h2>Hostel Admin</h2>

<a href="index.html"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="pages/students.html"><i class="fa fa-user"></i> Students</a>
<a href="pages/rooms.html"><i class="fa fa-bed"></i> Rooms</a>
<a href="pages/maintenance.html"><i class="fa fa-wrench"></i> Maintenance</a>
<a href="pages/visitors.html"><i class="fa fa-users"></i> Visitors</a>
<a href="pages/fees.html"><i class="fa fa-money-bill"></i> Fees</a>

</div>


<div class="main">

<h1>Dashboard</h1>

<button onclick="location.href='pages/addStudent.html'" class="add-btn">
<i class="fa fa-user-plus"></i> Add Student
</button>

<div class="cards">

<div class="card">
<h3>Total Students</h3>
<p id="totalStudents">0</p>
</div>

<div class="card">
<h3>Available Rooms</h3>
<p id="availableRooms">0</p>
</div>

<div class="card">
<h3>Pending Maintenance</h3>
<p id="maintenanceCount">0</p>
<a href="pages/maintenance.html">View Requests</a>
</div>

<div class="card">
<h3>Fees Pending</h3>
<p id="feesPending">0</p>
</div>

</div>

</div>


<script>

async function loadDashboard(){

try{

/* Load students */

const studentRes = await fetch("http://localhost:5000/students")
const students = await studentRes.json()

document.getElementById("totalStudents").innerText = students.length


/* Load maintenance */

const maintenanceRes = await fetch("http://localhost:5000/maintenance")
const maintenance = await maintenanceRes.json()

const pending = maintenance.filter(m => m.status === "Pending")

document.getElementById("maintenanceCount").innerText = pending.length


}catch(err){

console.log("Error loading dashboard",err)

}

}

loadDashboard()

</script>

</body>
</html>
