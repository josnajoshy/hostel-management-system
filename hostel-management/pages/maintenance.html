<!DOCTYPE html>
<html>
<head>
<title>Maintenance</title>

<link rel="stylesheet" href="../css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="sidebar">

<h2>Hostel Admin</h2>

<a href="../index.html"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="students.html"><i class="fa fa-user"></i> Students</a>
<a href="rooms.html"><i class="fa fa-bed"></i> Rooms</a>
<a href="maintenance.html"><i class="fa fa-wrench"></i> Maintenance</a>
<a href="visitors.html"><i class="fa fa-users"></i> Visitors</a>
<a href="fees.html"><i class="fa fa-money-bill"></i> Fees</a>

</div>

<div class="main">

<h1>Maintenance Requests</h1>

<button onclick="location.href='addMaintenance.html'" class="add-btn">
<i class="fa fa-plus"></i> Add Request
</button>

<table id="maintenanceTable">

<thead>
<tr>
<th>ID</th>
<th>Room</th>
<th>Issue</th>
<th>Date</th>
<th>Status</th>
</tr>
</thead>

<tbody id="maintenanceBody"></tbody>

</table>

</div>

<script>

async function loadMaintenance(){

const res = await fetch("http://localhost:5000/maintenance")
const data = await res.json()

let table = ""

data.forEach(m => {

table += `
<tr>

<td>${m.request_id}</td>

<td>${m.room_id}</td>

<td>${m.issue}</td>

<td>${m.request_date}</td>

<td>
<select onchange="updateStatus(${m.request_id}, this.value)">

<option value="Pending" ${m.status=="Pending"?"selected":""}>
Pending
</option>

<option value="In Progress" ${m.status=="In Progress"?"selected":""}>
In Progress
</option>

<option value="Completed" ${m.status=="Completed"?"selected":""}>
Completed
</option>

</select>
</td>

</tr>
`

})

document.getElementById("maintenanceBody").innerHTML = table

}

loadMaintenance()


async function updateStatus(id,status){

await fetch(`http://localhost:5000/updateMaintenance/${id}`,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({status:status})

})

}

</script>

</body>
</html>
