<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rooms — HostelOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo"><span class="logo-icon">⬡</span><span class="logo-text">HostelOS</span></div>
    <nav class="sidebar-nav">
      <a href="../index.html" class="nav-item"><span class="nav-icon">◈</span> Dashboard</a>
      <a href="students.html" class="nav-item"><span class="nav-icon">◉</span> Students</a>
      <a href="rooms.html" class="nav-item active"><span class="nav-icon">▣</span> Rooms</a>
      <a href="fees.html" class="nav-item"><span class="nav-icon">◎</span> Fees</a>
      <a href="maintenance.html" class="nav-item"><span class="nav-icon">⚙</span> Maintenance</a>
      <a href="visitors.html" class="nav-item"><span class="nav-icon">◌</span> Visitors</a>
    </nav>
    <div class="sidebar-footer"><div class="admin-badge"><span class="admin-dot"></span><span>Admin Online</span></div></div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title">Rooms</h1>
        <span class="page-sub">Allocation & availability</span>
      </div>
      <div class="topbar-right">
        <select id="filterStatus" class="search-input" onchange="renderTable()" style="width:160px">
          <option value="">All Rooms</option>
          <option value="Occupied">Occupied</option>
          <option value="Available">Available</option>
          <option value="Maintenance">Maintenance</option>
        </select>
        <button class="btn-primary" onclick="showModal('addRoomModal')">+ Add Room</button>
      </div>
    </header>

    <!-- Legend -->
    <div style="display:flex;gap:16px;margin-bottom:20px;font-family:var(--font-mono);font-size:11px">
      <span><span class="badge badge-red">■</span> Occupied</span>
      <span><span class="badge badge-green">■</span> Available</span>
      <span><span class="badge badge-yellow">■</span> Maintenance</span>
    </div>

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr><th>Room ID</th><th>Type</th><th>Capacity</th><th>Rent/Month</th><th>Status</th><th>Occupants</th><th>Actions</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>

  <div class="modal-overlay" id="addRoomModal">
    <div class="modal">
      <div class="modal-header"><h3>Add Room</h3><button class="modal-close" onclick="closeModal('addRoomModal')">✕</button></div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group"><label>Room ID</label><input type="number" id="rId" placeholder="e.g. 111"/></div>
          <div class="form-group"><label>Type</label>
            <select id="rType"><option>Single</option><option>Double</option><option>Triple</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Capacity</label><input type="number" id="rCap" placeholder="1-3"/></div>
          <div class="form-group"><label>Rent (₹/month)</label><input type="number" id="rRent" placeholder="e.g. 3000"/></div>
        </div>
        <div class="form-group"><label>Status</label>
          <select id="rStatus"><option>Available</option><option>Occupied</option><option>Maintenance</option></select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('addRoomModal')">Cancel</button>
        <button class="btn-primary" onclick="addRoom()">Add Room</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header"><h3>Edit Room</h3><button class="modal-close" onclick="closeModal('editModal')">✕</button></div>
      <div class="modal-body">
        <input type="hidden" id="eId"/>
        <div class="form-row">
          <div class="form-group"><label>Type</label>
            <select id="eType"><option>Single</option><option>Double</option><option>Triple</option></select>
          </div>
          <div class="form-group"><label>Capacity</label><input type="number" id="eCap"/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Rent</label><input type="number" id="eRent"/></div>
          <div class="form-group"><label>Status</label>
            <select id="eStatus"><option>Available</option><option>Occupied</option><option>Maintenance</option></select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeModal('editModal')">Cancel</button>
        <button class="btn-primary" onclick="saveEdit()">Save</button>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script>
    function renderTable() {
      const filter = document.getElementById('filterStatus').value;
      const rows = DB.rooms.filter(r => !filter || r.status === filter);
      const tbody = document.getElementById('tableBody');
      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">▣</div>No rooms found</div></td></tr>`;
        return;
      }
      tbody.innerHTML = rows.map(r => {
        const occupants = DB.students.filter(s => s.roomId === r.id).map(s => s.name).join(', ') || '—';
        const cls = r.status === 'Occupied' ? 'badge-red' : r.status === 'Maintenance' ? 'badge-yellow' : 'badge-green';
        return `<tr>
          <td><strong>${r.id}</strong></td>
          <td>${r.type}</td>
          <td>${r.capacity}</td>
          <td style="font-family:var(--font-mono)">₹${r.rent.toLocaleString('en-IN')}</td>
          <td><span class="badge ${cls}">${r.status}</span></td>
          <td style="font-size:12px;color:var(--text2)">${occupants}</td>
          <td><div class="action-cell">
            <button class="btn-sm" onclick="openEdit(${r.id})">Edit</button>
            <button class="btn-danger" onclick="deleteRoom(${r.id})">Delete</button>
          </div></td>
        </tr>`;
      }).join('');
    }

    function addRoom() {
      const id = parseInt(document.getElementById('rId').value);
      if (!id) { toast('Enter a room ID','error'); return; }
      if (DB.rooms.find(r => r.id === id)) { toast('Room ID already exists','error'); return; }
      DB.rooms.push({
        id, type: document.getElementById('rType').value,
        capacity: parseInt(document.getElementById('rCap').value) || 1,
        rent: parseInt(document.getElementById('rRent').value) || 0,
        status: document.getElementById('rStatus').value
      });
      DB.save(); closeModal('addRoomModal'); toast('Room added!'); renderTable();
    }

    function openEdit(id) {
      const r = DB.rooms.find(x => x.id === id);
      document.getElementById('eId').value = r.id;
      document.getElementById('eType').value = r.type;
      document.getElementById('eCap').value = r.capacity;
      document.getElementById('eRent').value = r.rent;
      document.getElementById('eStatus').value = r.status;
      showModal('editModal');
    }

    function saveEdit() {
      const id = parseInt(document.getElementById('eId').value);
      const r = DB.rooms.find(x => x.id === id);
      r.type = document.getElementById('eType').value;
      r.capacity = parseInt(document.getElementById('eCap').value);
      r.rent = parseInt(document.getElementById('eRent').value);
      r.status = document.getElementById('eStatus').value;
      DB.save(); closeModal('editModal'); toast('Room updated!'); renderTable();
    }

    function deleteRoom(id) {
      if (!confirm('Delete this room?')) return;
      DB.rooms = DB.rooms.filter(r => r.id !== id);
      DB.save(); toast('Room deleted'); renderTable();
    }

    renderTable();
  </script>
</body>
</html>
