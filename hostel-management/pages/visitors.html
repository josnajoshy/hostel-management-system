<!DOCTYPE html>
<html>
<head>
<title>Visitors</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="sidebar">

<h2>Hostel Admin</h2>

<a href="../index.html"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="students.html"><i class="fa fa-user"></i> Students</a>
<a href="rooms.html"><i class="fa fa-bed"></i> Rooms</a>
<a href="maintenance.html"><i class="fa fa-wrench"></i> Maintenance</a>
<a href="visitors.html"><i class="fa fa-users"></i> Visitors</a>
<a href="fees.html"><i class="fa fa-money-bill"></i> Fees</a>

</div>

<div class="main">

<h1>Visitors</h1>

<button onclick="location.href='addVisitor.html'" class="add-btn">
<i class="fa fa-plus"></i> Add Visitor
</button>

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Student</th>
<th>Relation</th>
<th>Date</th>
</tr>
</thead>

<tbody id="visitorBody"></tbody>

</table>

</div>

<script>

async function loadVisitors(){

const res=await fetch("http://localhost:5000/visitors")

const data=await res.json()

let table=""

data.forEach(v=>{

table+=`
<tr>

<td>${v.visitor_id}</td>
<td>${v.visitor_name}</td>
<td>${v.student_id}</td>
<td>${v.relation}</td>
<td>${v.visit_date}</td>

</tr>
`

})

document.getElementById("visitorBody").innerHTML=table

}

loadVisitors()

</script>

</body>
</html>
