<!DOCTYPE html>
<html>
<head>
<title>Students</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="sidebar">

<h2>Hostel Admin</h2>

<a href="../index.html"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="students.html"><i class="fa fa-user"></i> Students</a>
<a href="rooms.html"><i class="fa fa-bed"></i> Rooms</a>
<a href="maintenance.html"><i class="fa fa-wrench"></i> Maintenance</a>
<a href="visitors.html"><i class="fa fa-users"></i> Visitors</a>
<a href="fees.html"><i class="fa fa-money-bill"></i> Fees</a>

</div>

<div class="main">

<h1>Students</h1>

<input type="text" id="searchInput" placeholder="Search student..." onkeyup="searchStudent()">

<table id="studentTable">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Department</th>
<th>Room</th>
</tr>
</thead>

<tbody id="studentBody">
</tbody>

</table>

</div>

<script>

async function loadStudents(){

const response = await fetch("http://localhost:5000/students")

const students = await response.json()

let table = document.getElementById("studentBody")

table.innerHTML = ""

students.forEach(student => {

table.innerHTML += `
<tr>
<td>${student.id}</td>
<td>${student.name}</td>
<td>${student.department}</td>
<td>${student.room}</td>
</tr>
`

})

}

function searchStudent(){

let input = document.getElementById("searchInput").value.toLowerCase()

let rows = document.querySelectorAll("#studentTable tbody tr")

rows.forEach(row => {

let text = row.innerText.toLowerCase()

row.style.display = text.includes(input) ? "" : "none"

})

}

loadStudents()

</script>

</body>
</html>
