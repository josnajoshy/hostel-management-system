<!DOCTYPE html>
<html>
<head>
<title>Fees</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="sidebar">

<h2>Hostel Admin</h2>

<a href="../index.html"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="students.html"><i class="fa fa-user"></i> Students</a>
<a href="rooms.html"><i class="fa fa-bed"></i> Rooms</a>
<a href="maintenance.html"><i class="fa fa-wrench"></i> Maintenance</a>
<a href="visitors.html"><i class="fa fa-users"></i> Visitors</a>
<a href="fees.html"><i class="fa fa-money-bill"></i> Fees</a>

</div>


<div class="main">

<h1>Fee Management</h1>

<a href="addFees.html">
<button class="add-btn">
<i class="fa fa-plus"></i> Update Fee
</button>
</a>

<table>

<thead>

<tr>
<th>ID</th>
<th>Student</th>
<th>Amount</th>
<th>Payment Date</th>
<th>Status</th>
</tr>

</thead>

<tbody id="feeBody"></tbody>

</table>

</div>


<script>

async function loadFees(){

const res = await fetch("http://localhost:5000/fees")

const data = await res.json()

let table = ""

data.forEach(f => {

table += `
<tr>

<td>${f.fee_id || "-"}</td>

<td>${f.student_name}</td>

<td>${f.amount || "-"}</td>

<td>${f.payment_date || "-"}</td>

<td>

<select onchange="updateFee(${f.fee_id || 0},this.value)">

<option value="Pending" ${f.status=="Pending"?"selected":""}>
Pending
</option>

<option value="Paid" ${f.status=="Paid"?"selected":""}>
Paid
</option>

</select>

</td>

</tr>
`

})

document.getElementById("feeBody").innerHTML = table

}

loadFees()


async function updateFee(id,status){

if(id === 0){
alert("Please add a fee record first")
return
}

await fetch(`http://localhost:5000/updateFee/${id}`,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({status:status})

})

}

</script>

</body>
</html>
