<!DOCTYPE html>
<html>
<head>
<title>Maintenance</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="sidebar">

<h2>Hostel Admin</h2>

<a href="../index.html"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="students.html"><i class="fa fa-user"></i> Students</a>
<a href="rooms.html"><i class="fa fa-bed"></i> Rooms</a>
<a href="maintenance.html"><i class="fa fa-wrench"></i> Maintenance</a>
<a href="visitors.html"><i class="fa fa-users"></i> Visitors</a>
<a href="fees.html"><i class="fa fa-money-bill"></i> Fees</a>

</div>

<div class="main">

<h1>Maintenance Requests</h1>

<div class="form-container">
    <h2>Request Details</h2>
    <form id="maintForm" onsubmit="event.preventDefault(); addMaint();">
        <label>ID:</label><input type="number" id="maintId" required>
        <label>Room:</label><input type="number" id="maintRoom" required>
        <label>Issue:</label><input type="text" id="maintIssue" required>
        <label>Date:</label><input type="date" id="maintDate" required>
        <label>Status:</label>
        <select id="maintStatus">
            <option>Pending</option>
            <option>In Progress</option>
            <option>Completed</option>
        </select>
        <button type="submit">Add</button>
    </form>
</div>

<input type="text" id="maintSearch" placeholder="Search issue..." onkeyup="searchMaint()">

<table id="maintTable">

<tr>
<th>Request ID</th>
<th>Room</th>
<th>Issue</th>
<th>Date</th>
<th>Status</th>
<th>Actions</th>
</tr>

</table>

</div>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
renderMaintenance();
</script>

</body>
</html>
