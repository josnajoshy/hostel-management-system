<!DOCTYPE html>
<html>
<head>
<title>Fees</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="sidebar">

<h2>Hostel Admin</h2>

<a href="../index.html"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="students.html"><i class="fa fa-user"></i> Students</a>
<a href="rooms.html"><i class="fa fa-bed"></i> Rooms</a>
<a href="maintenance.html"><i class="fa fa-wrench"></i> Maintenance</a>
<a href="visitors.html"><i class="fa fa-users"></i> Visitors</a>
<a href="fees.html"><i class="fa fa-money-bill"></i> Fees</a>

</div>

<div class="main">

<h1>Fee Management</h1>

<div class="form-container">
    <h2>Record Fee</h2>
    <form id="feeForm" onsubmit="event.preventDefault(); addFee();">
        <label>Student ID:</label><input type="number" id="feeStudentId" required>
        <label>Name:</label><input type="text" id="feeName" required>
        <label>Amount:</label><input type="number" id="feeAmount" required>
        <label>Status:</label>
        <select id="feeStatus">
            <option>Paid</option>
            <option>Pending</option>
        </select>
        <label>Payment Date:</label><input type="date" id="feeDate">
        <button type="submit">Add</button>
    </form>
</div>

<input type="text" id="feeSearch" placeholder="Search by name..." onkeyup="searchFee()">

<table id="feeTable">

<tr>
<th>Student ID</th>
<th>Name</th>
<th>Amount</th>
<th>Status</th>
<th>Payment Date</th>
<th>Actions</th>
</tr>

</table>

</div>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
renderFees();
</script>

</body>
</html>
