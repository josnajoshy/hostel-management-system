<!DOCTYPE html>
<html>
<head>
<title>Rooms</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="sidebar">

<h2>Hostel Admin</h2>

<a href="../index.html"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="students.html"><i class="fa fa-user"></i> Students</a>
<a href="rooms.html"><i class="fa fa-bed"></i> Rooms</a>
<a href="maintenance.html"><i class="fa fa-wrench"></i> Maintenance</a>
<a href="visitors.html"><i class="fa fa-users"></i> Visitors</a>
<a href="fees.html"><i class="fa fa-money-bill"></i> Fees</a>

</div>

<div class="main">

<h1>Room Management</h1>

<!-- add/edit form -->
<div class="form-container">
    <h2>Room Details</h2>
    <form id="roomForm" onsubmit="event.preventDefault(); addRoom();">
        <label>Number:</label>
        <input type="number" id="roomNumber" required>
        <label>Block:</label>
        <input type="text" id="roomBlock" required>
        <label>Capacity:</label>
        <input type="number" id="roomCapacity" required>
        <label>Occupied:</label>
        <input type="number" id="roomOccupied" required>
        <label>Status:</label>
        <select id="roomStatus">
            <option>Available</option>
            <option>Full</option>
        </select>
        <button type="submit">Add</button>
    </form>
</div>

<input type="text" id="roomSearch" placeholder="Search room..." onkeyup="searchRoom()">

<table id="roomTable">

<tr>
<th>Room Number</th>
<th>Block</th>
<th>Capacity</th>
<th>Occupied</th>
<th>Status</th>
<th>Actions</th>
</tr>

</table>

</div>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
renderRooms();
</script>

</body>
</html>
