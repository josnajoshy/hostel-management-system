<!DOCTYPE html>
<html>
<head>
<title>Visitors</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="sidebar">

<h2>Hostel Admin</h2>

<a href="../index.html"><i class="fa fa-chart-line"></i> Dashboard</a>
<a href="students.html"><i class="fa fa-user"></i> Students</a>
<a href="rooms.html"><i class="fa fa-bed"></i> Rooms</a>
<a href="maintenance.html"><i class="fa fa-wrench"></i> Maintenance</a>
<a href="visitors.html"><i class="fa fa-users"></i> Visitors</a>
<a href="fees.html"><i class="fa fa-money-bill"></i> Fees</a>

</div>

<div class="main">

<h1>Visitor Log</h1>

<div class="form-container">
    <h2>Visitor Entry</h2>
    <form id="visitorForm" onsubmit="event.preventDefault(); addVisitor();">
        <label>Name:</label><input type="text" id="visName" required>
        <label>Student:</label><input type="text" id="visStudent" required>
        <label>Room:</label><input type="number" id="visRoom" required>
        <label>Date:</label><input type="date" id="visDate" required>
        <label>In:</label><input type="time" id="visIn" required>
        <label>Out:</label><input type="time" id="visOut" required>
        <button type="submit">Add</button>
    </form>
</div>

<input type="text" id="visitorSearch" placeholder="Search visitor..." onkeyup="searchVisitor()">

<table id="visitorTable">

<tr>
<th>Visitor Name</th>
<th>Student</th>
<th>Room</th>
<th>Date</th>
<th>Time In</th>
<th>Time Out</th>
<th>Actions</th>
</tr>

</table>

</div>

<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
renderVisitors();
</script>

</body>
</html>
